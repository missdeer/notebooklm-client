name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o notebooklm-linux-${{ matrix.goarch }} ./cmd/notebooklm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-linux-${{ matrix.goarch }}
          path: notebooklm-linux-${{ matrix.goarch }}

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o notebooklm-windows-${{ matrix.goarch }}.exe ./cmd/notebooklm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-windows-${{ matrix.goarch }}
          path: notebooklm-windows-${{ matrix.goarch }}.exe

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o notebooklm-darwin-amd64 ./cmd/notebooklm

      - name: Build arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o notebooklm-darwin-arm64 ./cmd/notebooklm

      - name: Create universal binary
        run: lipo -create -output notebooklm-darwin-universal notebooklm-darwin-amd64 notebooklm-darwin-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-darwin-universal
          path: notebooklm-darwin-universal

  release:
    needs: [build-linux, build-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  npm-publish:
    needs: [build-linux, build-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm/artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm
          chmod +x publish.sh
          ./publish.sh "${{ steps.version.outputs.version }}"
